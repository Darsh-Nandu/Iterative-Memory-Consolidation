experiment:
  name: "imc_gemini_free_tier_experiment"
  seed: 42
  output_dir: "results"
  token_budgets: [500, 1000]
  ablation_passes: [1, 2]

dataset:
  family: "arxiv"
  search_query: "LLM context compression architecture" # <-- ADD THIS LINE
  sample_size: 1
  max_doc_length_tokens: 8000

chunking:
  strategy: "recursive"
  size: 2048
  overlap: 256

model:
  provider: "ollama"
  name: "llama3.2:1b"
  temperature: 0.0
  max_tokens: 2048

evaluation:
  num_questions_per_doc: 15
  llm_judge_model: "llama3.2:1b"