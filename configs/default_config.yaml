experiment:
  name: "imc_gemini_free_tier_experiment"
  seed: 42
  output_dir: "results"
  token_budgets: [500, 1000]
  ablation_passes: [1, 2] # Kept small initially to stay safely within Free Tier limits

dataset:
  family: "gutenberg"
  sample_size: 1
  max_doc_length_tokens: 5000

chunking:
  strategy: "recursive"
  size: 2048 # Increased size slightly to execute fewer individual API calls
  overlap: 256

model:
  provider: "google"
  name: "gemini-2.5-flash"
  temperature: 0.0
  max_tokens: 2048

evaluation:
  num_questions_per_doc: 10
  llm_judge_model: "gemini-2.5-flash"